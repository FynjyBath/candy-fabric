# HTTPS по IP-адресу с самоподписанным сертификатом.
# Сертификат создаётся командой (подставьте свой IP вместо 203.0.113.10):
#
#   sudo openssl req -x509 -nodes -newkey rsa:2048 -days 825 \
#     -keyout /etc/ssl/private/candy-selfsigned.key \
#     -out    /etc/ssl/certs/candy-selfsigned.crt \
#     -subj "/CN=203.0.113.10" \
#     -addext "subjectAltName=IP:203.0.113.10"

server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;

    ssl_certificate     /etc/ssl/certs/candy-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/candy-selfsigned.key;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
