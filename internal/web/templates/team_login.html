<!DOCTYPE html>
<html lang="ru">
<head>
{{template "head" .}}
<title>Вход команды — {{.Game.Title}}</title>
</head>
<body>
<main class="page narrow">
<h1>{{.Game.Title}}</h1>
<h2>Вход команды</h2>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<form method="post" action="/g/{{.Game.ID}}/team" class="login-form">
	<label>Логин <input name="login" required autofocus></label>
	<label>Пароль <input name="password" type="password" required></label>
	<button type="submit">Войти</button>
</form>
<p><a href="/g/{{.Game.ID}}">← Публичное табло</a></p>
</main>
</body>
</html>
